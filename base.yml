  # But matches can also be dynamic:

  # Print the current date
  - trigger: ";date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%m/%d/%Y"
  - trigger: "sgdt"
    replace: "- Day {{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%m/%d/%Y"
  # Print the output of a shell command
  - trigger: ";shell"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo 'Hello from your shell'"
  - trigger: ";time"
    replace: "{{mytime}}"
    vars:
      - name: mytime
        type: date
        params:
          format: "%I:%M %p"
  - trigger: ";clip"
    replace: "{{clipboard}}"
    vars:
      - name: clipboard
        type: clipboard
  # And much more! For more information, visit the docs: https://espanso.org/docs/

  - trigger: ";chap"
    force_mode: clipboard
    vars:
      - name: ref
        type: form
        params:
          layout: |
            Bible book and Chapter: [[book]]
    replace: |
      ```dataviewjs
      let verses = dv.pages('')
          .where(p => p.file.name.includes("{{ref.book}}-"))
          .sort(p => parseInt(p.file.name.match(/-(\d+)$/)[1]));

      verses.forEach((v, i) => {
          let verseText = "";

          if (v.file && v.file.content) {
              let lines = v.file.content.split('\n');
              let headingIndex = lines.findIndex(line => line.startsWith('## '));

              if (headingIndex !== -1) {
                  let verseLines = [];
                  for (let j = headingIndex + 1; j < lines.length; j++) {
                      if (lines[j].startsWith('## ')) break;
                      verseLines.push(lines[j]);
                  }
                  verseText = verseLines.join('\n').trim();
              }
          }

          if (!verseText && v.text) {
              verseText = v.text;
          }

          dv.paragraph(`${i+1}) [[${v.file.name}|${verseText || "No verse text found"}]]`);
      });
      ```
  - trigger: ";book"
    force_mode: clipboard
    vars:
      - name: ref
        type: form
        params:
          layout: |
            Bible book: [[book]]
    replace: |
      ```dataviewjs
        dv.list(
          dv.pages()
            .where(p => p.file.name.startsWith("{{ref.book}} Chapter "))
            .sort(p => p.file.name, 'asc')
            .map(p => p.file.link)
        );
        ```
  